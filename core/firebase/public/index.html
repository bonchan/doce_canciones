<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Device Network Telemetry Matrix</title>

  <script defer src="/__/firebase/12.14.0/firebase-app-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-auth-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-database-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-firestore-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-functions-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-messaging-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-storage-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-analytics-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-remote-config-compat.js"></script>
  <script defer src="/__/firebase/12.14.0/firebase-performance-compat.js"></script>

  <script defer src="/__/firebase/init.js?useEmulator=false"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <div>
        <h1>Telemetry Dashboard</h1>
      </div>
      <div class="sync-time" style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
        <div>Last Sync: <span id="sync-timestamp">Connecting...</span></div>
        <div style="font-size: 12px; color: #38bdf8; font-family: monospace;" id="sync-counter"></div>
      </div>
    </header>

    <h1>Satellites</h1>
    <main class="device-grid" id="satellites-container">
      <div class="empty-state">Waiting for data payload from Firebase...</div>
    </main>

    <h1>Displays</h1>
    <main class="device-grid" id="displays-container">
      <div class="empty-state">Waiting for data payload from Firebase...</div>
    </main>
  </div>

  <script>

    function formatHumanReadable(totalSeconds) {
      if (totalSeconds === 0) return "0 seconds";

      let remainder = totalSeconds;

      // 1 year = 365 days * 24 * 60 * 60 = 31,536,000 seconds
      const y = Math.floor(remainder / 31536000);
      remainder %= 31536000;

      // 1 month average = 30.44 days * 24 * 60 * 60 = 2,630,016 seconds
      const mo = Math.floor(remainder / 2630016);
      remainder %= 2630016;

      // 1 day = 86,400 seconds
      const d = Math.floor(remainder / 86400);
      remainder %= 86400;

      // 1 hour = 3,600 seconds
      const h = Math.floor(remainder / 3600);
      remainder %= 3600;

      // 1 minute = 60 seconds
      const m = Math.floor(remainder / 60);
      const s = remainder % 60;

      const parts = [];

      if (y > 0) parts.push(y === 1 ? "1 year" : `${y} years`);
      if (mo > 0) parts.push(mo === 1 ? "1 month" : `${mo} months`);
      if (d > 0) parts.push(d === 1 ? "1 day" : `${d} days`);
      if (h > 0) parts.push(h === 1 ? "1 hour" : `${h} hours`);
      if (m > 0) parts.push(m === 1 ? "1 minute" : `${m} minutes`);
      if (s > 0) parts.push(s === 1 ? "1 second" : `${s} seconds`);

      return parts.join(", ");
    }

    document.addEventListener('DOMContentLoaded', function () {
      const syncTimeEl = document.getElementById("sync-timestamp");
      const satellitesContainerEl = document.getElementById("satellites-container");
      const displaysContainerEl = document.getElementById("displays-container");

      // ── SELECT THE NEW COUNTER DOM NODE ──
      const syncCounterEl = document.getElementById("sync-counter");

      // Track the last sync timestamp globally inside the event loop closure
      let lastSyncDate = null;
      let intervalSeconds = null;

      try {
        const database = firebase.database();
        const snapshotRef = database.ref('device_snapshot');

        snapshotRef.on('value', (snapshot) => {
          const payload = snapshot.val();

          if (!payload) {
            satellitesContainerEl = `<div class="empty-state">No device snapshots found in database tree.</div>`;
            displaysContainerEl = `<div class="empty-state">No device snapshots found in database tree.</div>`;
            syncTimeEl.innerText = "Never";
            syncCounterEl.innerText = "";
            return;
          }

          if (payload.last_sync) {
            let utcString = payload.last_sync;
            if (!utcString.endsWith('Z')) {
              utcString += 'Z';
            }
            lastSyncDate = new Date(utcString);
            syncTimeEl.innerText = lastSyncDate.toLocaleTimeString();
            syncCounterEl.innerText = `Refresh in ${intervalSeconds} seconds`;
          }

          if (payload.interval_seconds) {
            intervalSeconds = payload.interval_seconds
          }

          satellitesContainerEl.innerHTML = "";
          displaysContainerEl.innerHTML = "";

          const devices = payload.devices || {};
          const deviceIds = Object.keys(devices);

          if (deviceIds.length === 0) {
            satellitesContainerEl.innerHTML = `<div class="empty-state">No devices currently reporting sync nodes.</div>`;
            displaysContainerEl.innerHTML = `<div class="empty-state">No devices currently reporting sync nodes.</div>`;
            return;
          }

          deviceIds.forEach(chipId => {
            const deviceData = devices[chipId];
            const isOnline = deviceData.online !== undefined ? deviceData.online : true;
            const statusClass = isOnline ? 'status-online' : 'status-offline';
            const statusText = isOnline ? 'Online' : 'Offline';

            const card = document.createElement("div");
            card.className = "device-card";

            let telemetryHtml = "";

            Object.keys(deviceData).forEach(key => {
              if (key === 'online') return;

              const val = typeof deviceData[key] === 'object'
                ? JSON.stringify(deviceData[key])
                : deviceData[key];

              telemetryHtml += `
                <div class="telemetry-row">
                    <span class="telemetry-label">${key}:</span>
                    <span class="telemetry-value">${val}</span>
                </div>
              `;
            });

            card.innerHTML = `
              <div class="device-header">
                  <span class="chip-id">ID: ${chipId}</span>
                  <span class="status-badge ${statusClass}">${statusText}</span>
              </div>
              <div class="device-body">
                  ${telemetryHtml}
              </div>
            `;

            if (deviceData.device_type == 'satellite') {
              satellitesContainerEl.appendChild(card);
            } else {
              displaysContainerEl.appendChild(card);
            }

          });
        }, (error) => {
          console.error("Firebase database read error execution trap:", error);
          syncTimeEl.innerText = "Read Error";
        });

        // ── LIVE TICKING COUNTER ENGINE ──────────────────────────────────────
        // Fires every 1000 milliseconds to calculate delta time on the interface
        setInterval(() => {
          if (!lastSyncDate) return;

          const now = new Date();
          const secondsElapsed = Math.floor((now - lastSyncDate) / 1000);
          const cleanSeconds = Math.max(0, secondsElapsed);

          const delta = intervalSeconds - cleanSeconds;

          if (delta >= 0) {
            // Counts down nicely while waiting for the next automated refresh
            syncCounterEl.innerText = `Refresh in ${delta} seconds`;
          } else {
            // Flips over to counting up to show how long it has been offline
            const absoluteSeconds = Math.abs(delta);
            syncCounterEl.innerText = `Offline for ${formatHumanReadable(absoluteSeconds)}`;
          }
        }, 1000);

      } catch (e) {
        console.error("Initialization Error:", e);
        syncTimeEl.innerText = "SDK Error";
      }
    });
  </script>
</body>

</html>
